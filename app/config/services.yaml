# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    uploads_dir: '%kernel.project_dir%/public/uploads'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $uploadsDir: '%uploads_dir%'

    App\:
        resource: '../src/'

    # Domain interface → Infrastructure implementation aliases
    App\Domain\Artwork\Repository\ArtworkRepository:
        alias: App\Infrastructure\Persistence\Doctrine\DoctrineArtworkRepository

    App\Domain\Category\Repository\CategoryRepository:
        alias: App\Infrastructure\Persistence\Doctrine\DoctrineCategoryRepository

    App\Domain\Tag\Repository\TagRepository:
        alias: App\Infrastructure\Persistence\Doctrine\DoctrineTagRepository

    App\Domain\Blog\Repository\PostRepository:
        alias: App\Infrastructure\Persistence\Doctrine\DoctrinePostRepository

    App\Domain\About\Repository\AboutPageRepository:
        alias: App\Infrastructure\Persistence\Doctrine\DoctrineAboutPageRepository

    App\Domain\Sync\Repository\SyncLogRepository:
        alias: App\Infrastructure\Persistence\Doctrine\DoctrineSyncLogRepository

    App\Application\Shared\ImageProcessor:
        alias: App\Infrastructure\Image\GdImageProcessor

    App\Application\Shared\BigCartelFeedFetcher:
        alias: App\Infrastructure\Http\Feed\RssXmlBigCartelFeedFetcher

    App\Application\Shared\RemoteImageDownloader:
        alias: App\Infrastructure\Image\GdRemoteImageDownloader

    # Services requiring scalar parameters beyond the global bind
    App\Application\Sync\SyncWithBigCartelService:
        arguments:
            $feedUrl: '%env(BIGCARTEL_FEED_URL)%'

    App\Infrastructure\Http\Controller\Public\AboutController:
        arguments:
            $contactEmail: '%env(CONTACT_EMAIL)%'
